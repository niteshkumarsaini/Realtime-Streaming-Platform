<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal Streaming Player</title>

<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#020617;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
}

/* container */

.container{
width:1200px;
max-width:100%;
}

/* header */

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:36px;
font-weight:700;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
-webkit-background-clip:text;
color:transparent;
}

.header p{
opacity:.7;
margin-top:6px;
}

/* search bar */

.searchBar{
display:flex;
gap:12px;
margin-bottom:25px;
}

.searchBar input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
background:#111827;
color:white;
font-size:15px;
}

.searchBar button{

padding:14px 22px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:15px;

background:linear-gradient(135deg,#06b6d4,#3b82f6);

color:white;
transition:.25s;

}

.searchBar button:hover{
transform:scale(1.05);
}

/* player */

.player-wrapper{

background:#0f172a;
border-radius:14px;
padding:12px;
box-shadow:0 10px 40px rgba(0,0,0,.6);

}

video,iframe{

width:100%;
height:600px;
border-radius:10px;

}

/* footer */

.footer{

text-align:center;
margin-top:20px;
font-size:14px;
opacity:.7;

}

.creator{
color:#38bdf8;
font-weight:600;
}

/* ====================== */
/* Tablet */
/* ====================== */

@media (max-width:1024px){

.container{
width:100%;
}

video,iframe{
height:420px;
}

.header h1{
font-size:30px;
}

}

/* ====================== */
/* Mobile */
/* ====================== */

@media (max-width:768px){

body{
padding:10px;
}

.container{
width:100%;
}

.header{
margin-bottom:15px;
}

.header h1{
font-size:24px;
}

.header p{
font-size:14px;
}

.searchBar{

flex-direction:column;

}

.searchBar input{

width:100%;

}

.searchBar button{

width:100%;

}

video,iframe{

height:240px;

}

}

/* ====================== */
/* Small Mobile */
/* ====================== */

@media (max-width:480px){

video,iframe{
height:210px;
}

}

/* ====================== */
/* Landscape Mobile */
/* ====================== */

@media (orientation:landscape) and (max-width:900px){

body{
padding:0;
}

.header,
.searchBar,
.footer{
display:none;
}

.container{
width:100%;
}

.player-wrapper{
border-radius:0;
padding:0;
}

video,iframe{

height:100vh;
width:100vw;
border-radius:0;

}

}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Universal Streaming Player</h1>
<p>Play YouTube • MKV • MP4 • WebM • HLS • 4K</p>

</div>

<div class="searchBar">

<input id="url" placeholder="Paste YouTube / MP4 / MKV / Stream link">

<button onclick="playVideo()">Play</button>

<button onclick="autoDetect()">Auto Detect</button>

</div>

<div class="player-wrapper">

<video id="videoPlayer" controls playsinline></video>

<div id="youtubeContainer" style="display:none"></div>

</div>

<div class="footer">

🚀 Created & Developed by <span class="creator">Nitesh Kumar</span>

</div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

let video = document.getElementById("videoPlayer");
let youtubeContainer = document.getElementById("youtubeContainer");

let player = new Plyr(video,{
controls:[
'play-large',
'play',
'progress',
'current-time',
'mute',
'volume',
'settings',
'fullscreen'
]
});

function playVideo(){

let url=document.getElementById("url").value.trim();

if(url===""){
alert("Paste video link");
return;
}

if(url.includes("youtube.com") || url.includes("youtu.be")){
playYoutube(url);
}else{
playDirect(url);
}

}

function autoDetect(){
playVideo();
}

function playYoutube(url){

video.pause();
video.style.display="none";

youtubeContainer.style.display="block";

let id = extractYoutubeID(url);

youtubeContainer.innerHTML=`
<div class="plyr__video-embed" id="ytplayer">
<iframe
src="https://www.youtube.com/embed/${id}?playsinline=1"
allowfullscreen
allow="autoplay"
></iframe>
</div>`;

new Plyr('#ytplayer');

}

function playDirect(url){

youtubeContainer.innerHTML="";
youtubeContainer.style.display="none";

video.style.display="block";

if(url.includes(".m3u8")){

if(Hls.isSupported()){

const hls=new Hls();

hls.loadSource(url);
hls.attachMedia(video);

}

}else{

video.src=url;

}

video.play();

}

function extractYoutubeID(url){

let regExp=/((\?v=)|(\.be\/))([^&]+)/;

let match=url.match(regExp);

return match?match[4]:url;

}

</script>

</body>

</html>
