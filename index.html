<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal Streaming Player</title>

<link rel="icon" href="favicon.svg">

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#020617;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
padding:20px;
}

.container{
width:1200px;
max-width:100%;
}

/* HEADER */

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:34px;
background:linear-gradient(90deg,#06b6d4,#3b82f6);
-webkit-background-clip:text;
color:transparent;
}

/* SEARCH */

.searchBar{
display:flex;
gap:10px;
margin-bottom:25px;
}

.searchBar input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
background:#111827;
color:white;
}

.searchBar button{
padding:14px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:linear-gradient(135deg,#06b6d4,#3b82f6);
color:white;
}

/* PLAYER */

.player-wrapper{
background:#0f172a;
border-radius:14px;
padding:10px;
margin-bottom:35px;
}

video,iframe{
width:100%;
height:520px;
border-radius:10px;
}

/* CATEGORY TABS */

.category-tabs{
display:flex;
gap:18px;
margin-bottom:30px;
justify-content:center;
flex-wrap:wrap;
}

.category-tab{
padding:10px 22px;
background:#111827;
border-radius:30px;
cursor:pointer;
transition:.25s;
font-weight:600;
}

.category-tab:hover{
background:#1f2937;
}

.category-tab.active{
background:linear-gradient(135deg,#06b6d4,#3b82f6);
}

/* VIDEO GRID */

.video-grid{
display:grid;
grid-template-columns:repeat(auto-fit,220px);
gap:22px;
justify-content:center;
}

.video-card{
background:#111827;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.35s;
width:220px;
}

.video-card:hover{
transform:translateY(-6px) scale(1.04);
box-shadow:0 10px 30px rgba(0,0,0,.6);
}

.video-thumb{
width:100%;
height:140px;
object-fit:cover;
}

.video-title{
padding:10px;
font-size:14px;
font-weight:600;
text-align:center;
}

/* FOOTER */

.footer{
text-align:center;
margin-top:40px;
opacity:.7;
}

/* MOBILE */

@media(max-width:768px){

.searchBar{
flex-direction:column;
}

video{
height:230px;
}

.video-grid{
grid-template-columns:repeat(2,160px);
}

.video-card{
width:160px;
}

}

/* LANDSCAPE PLAYER */

@media (orientation:landscape) and (max-width:900px){

.header,
.searchBar,
.category-tabs,
.video-grid,
.footer{
display:none;
}

.player-wrapper{
border-radius:0;
padding:0;
}

video,iframe{
height:100vh;
width:100vw;
border-radius:0;
}

}

</style>

</head>

<body>

<div class="container">

<div class="header">
<h1>Universal Streaming Player</h1>
</div>

<div class="searchBar">

<input id="url" placeholder="Paste YouTube / MP4 / MKV / Stream link">

<button onclick="playVideo()">Play</button>
<button onclick="autoDetect()">Auto Detect</button>

</div>

<div class="player-wrapper">

<video id="videoPlayer" controls playsinline></video>
<div id="youtubeContainer" style="display:none"></div>

</div>

<div class="category-tabs" id="categoryTabs"></div>

<div class="video-grid" id="videoGrid"></div>

<div class="footer">
🚀 Created & Developed by <span style="color:#38bdf8">Nitesh Kumar</span>
</div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

let video=document.getElementById("videoPlayer");
let youtubeContainer=document.getElementById("youtubeContainer");

let player=new Plyr(video);

let allVideos=[];

async function loadVideoLibrary(){

const res=await fetch("Movies/data.json");
allVideos=await res.json();

createCategories();

}

function createCategories(){

let categories=[...new Set(allVideos.map(v=>v.category))];

let tabs=document.getElementById("categoryTabs");

categories.forEach((cat,index)=>{

let tab=document.createElement("div");

tab.className="category-tab";
tab.innerText=cat;

if(index===0){
tab.classList.add("active");
showCategory(cat);
}

tab.onclick=()=>{

document.querySelectorAll(".category-tab")
.forEach(t=>t.classList.remove("active"));

tab.classList.add("active");

showCategory(cat);

}

tabs.appendChild(tab);

});

}

function showCategory(category){

let grid=document.getElementById("videoGrid");

grid.innerHTML="";

let videos=allVideos.filter(v=>v.category===category);

videos.forEach(v=>{

let card=document.createElement("div");

card.className="video-card";

card.innerHTML=`
<img class="video-thumb" src="${v.thumb}">
<div class="video-title">${v.title}</div>
`;

card.onclick=()=>loadVideo(v.url);

grid.appendChild(card);

});

}

function loadVideo(url){

if(url.includes("youtube")||url.includes("youtu.be")){
playYoutube(url);
}else{
playDirect(url);
}

window.scrollTo({top:0,behavior:"smooth"});

}

function playVideo(){

let url=document.getElementById("url").value.trim();

if(!url){
alert("Paste video link");
return;
}

loadVideo(url);

}

function autoDetect(){
playVideo();
}

function playYoutube(url){

video.pause();
video.style.display="none";

youtubeContainer.style.display="block";

let id=url.split("v=")[1]||url.split("/").pop();

youtubeContainer.innerHTML=`
<div class="plyr__video-embed" id="ytplayer">
<iframe
src="https://www.youtube.com/embed/${id}?playsinline=1"
allowfullscreen
allow="autoplay"
></iframe>
</div>
`;

new Plyr('#ytplayer');

}

function playDirect(url){

youtubeContainer.innerHTML="";
youtubeContainer.style.display="none";

video.style.display="block";

if(url.includes(".m3u8")){

if(Hls.isSupported()){

const hls=new Hls();

hls.loadSource(url);
hls.attachMedia(video);

}

}else{

video.src=url;

}

video.play();

}

loadVideoLibrary();

</script>

</body>

</html>
